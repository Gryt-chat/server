name: Release Client

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release Channel'
        required: true
        default: 'beta'
        type: choice
        options: ['beta', 'latest']
      bump:
        description: 'Version Bump Type'
        required: true
        default: 'patch'
        type: choice
        options: ['patch', 'minor', 'major', 'custom']
      custom_version:
        description: 'Custom Version (if "custom" selected above, else leave blank)'
        required: false
        default: ''
        type: string

  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/gryt-chat/client
      OWNER: Gryt-chat
      REPO: gryt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Type-check and lint
        run: |
          npx tsc -b
          npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0 || true

      - name: Build native audio
        run: bash native/audio-capture/build.sh || echo "Native audio build skipped"

      - name: Build Electron app
        env:
          ELECTRON: '1'
        run: npx vite build

      - name: Set up Git user for version bump
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Bump version
        id: version
        uses: phips28/gh-action-bump-version@v11.0.2
        with:
          version-type: ${{ github.event.inputs.bump == 'custom' && '' || github.event.inputs.bump }}
          custom-tag: ${{ github.event.inputs.bump == 'custom' && github.event.inputs.custom_version || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.event_name }}"](#)
